<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 WebGL - Full Client</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ddd;
            user-select: none;
        }
        
        /* UI Layers */
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #menu-layer { position: absolute; width: 100%; height: 100%; background: #111; z-index: 20; display: flex; align-items: center; justify-content: center; }
        
        /* Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background-color: rgba(0, 255, 0, 0.8); transform: translate(-50%, -50%); display: none; }

        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 20px; display: none; flex-direction: column; gap: 5px; }
        .hud-box { background: rgba(0, 0, 0, 0.5); padding: 10px 20px; border-left: 4px solid #fff; font-size: 20px; font-weight: bold; }
        #hud-health { border-color: #ff3333; }
        #hud-money { border-color: #33ff33; color: #33ff33; }
        #hud-team { font-size: 14px; border-color: #aaa; }

        /* Chat */
        #chat-container { position: absolute; bottom: 120px; left: 20px; width: 300px; display: none; flex-direction: column; gap: 5px; }
        #chat-log { max-height: 150px; overflow-y: hidden; display: flex; flex-direction: column; gap: 2px; font-size: 14px; text-shadow: 1px 1px 1px #000; }
        #chat-input { display: none; width: 100%; padding: 8px; background: rgba(0,0,0,0.6); border: 1px solid #555; color: white; pointer-events: auto; outline: none; }

        /* Death Screen */
        #death-screen { position: absolute; width: 100%; height: 100%; background: rgba(200, 0, 0, 0.3); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 15; }
        #death-screen h1 { font-size: 48px; color: white; margin: 0; text-shadow: 2px 2px 5px black; }

        /* Menus (Main, Pause, Buy) */
        .window { background-color: rgba(20, 20, 20, 0.95); padding: 30px; border: 1px solid #444; pointer-events: auto; display: none; flex-direction: column; gap: 15px; min-width: 300px; }
        .window.active { display: flex; }
        h2 { margin: 0 0 10px 0; font-weight: normal; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        button { background-color: #333; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; transition: 0.1s; }
        button:hover { background-color: #555; }
        
        input[type="text"] { padding: 10px; background: #222; border: 1px solid #444; color: white; }

        /* Server Browser List */
        #server-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .server-item { display: flex; justify-content: space-between; padding: 10px; background: #2a2a2a; border: 1px solid #333; }
        .server-item button { padding: 5px 10px; background: #4caf50; border: none; }
        .server-item button:hover { background: #45a049; }

        /* Buy Menu Grid */
        #buy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .buy-item { background: #2a2a2a; padding: 15px; border: 1px solid #444; text-align: center; cursor: pointer; }
        .buy-item:hover { background: #3a3a3a; }
        .buy-item span { display: block; color: #33ff33; margin-top: 5px; }

    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    
    <div id="menu-layer">
        <div id="main-menu" class="window active" style="width: 500px;">
            <h2>CS2 Web Server Browser</h2>
            <div id="server-list">
                </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-server-ip" placeholder="Enter Server IP..." style="flex: 1;">
                <button id="btn-add-server">Add Server</button>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <div id="hud">
            <div id="hud-team" class="hud-box">TEAM: UNASSIGNED</div>
            <div id="hud-health" class="hud-box">+ 100</div>
            <div id="hud-money" class="hud-box">$ 800</div>
        </div>

        <div id="chat-container">
            <div id="chat-log"></div>
            <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
        </div>

        <div id="death-screen">
            <h1>YOU DIED</h1>
            <p>Respawning in 3 seconds...</p>
        </div>

        <div id="pause-menu" class="window" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <h2>Game Paused</h2>
            <button id="btn-resume">Resume Game</button>
            <button id="btn-disconnect">Disconnect</button>
        </div>

        <div id="buy-menu" class="window" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px;">
            <h2>Buy Menu <span style="float:right; color:#33ff33;" id="buy-money">$800</span></h2>
            <div id="buy-grid">
                <div class="buy-item" data-weapon="AK-47" data-price="2700">AK-47 <span>$2700</span></div>
                <div class="buy-item" data-weapon="Glock-18" data-price="200">Glock-18 <span>$200</span></div>
                <div class="buy-item" data-weapon="HE Grenade" data-price="300" style="grid-column: span 2;">HE Grenade <span>$300</span></div>
            </div>
            <button id="btn-close-buy">Close (B)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // --- Game State & Player Stats ---
        let gameState = 'MAIN_MENU'; // MAIN_MENU, PLAYING, DEAD, BUY_MENU, PAUSED
        const playerStats = {
            health: 100,
            money: 800,
            team: 'UNASSIGNED', // T or CT
            inventory: ['Knife']
        };

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 0, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1.0);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(100, 200, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- Physics Variables ---
        const clock = new THREE.Clock();
        const worldOctree = new Octree();

        const CAPSULE_RADIUS = 0.35;
        const HEIGHT_STAND = 0.38;
        const HEIGHT_CROUCH = 0.05;

        let spawnPoint = new THREE.Vector3(0, 50, 0);

        const playerCollider = new Capsule(new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, HEIGHT_STAND, 0), CAPSULE_RADIUS);
        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        let playerOnFloor = false;
        let mapLoaded = false;

        const GRAVITY = 30.0;
        const JUMP_FORCE = 11.0;
        const BASE_SPEED = 28.0;   
        const SPRINT_SPEED = 55.0; 
        const CROUCH_SPEED = 12.0; 
        const AIR_CONTROL = 12.0;

        // --- UI Elements ---
        const uiLayer = document.getElementById('ui-layer');
        const menuLayer = document.getElementById('menu-layer');
        const hud = document.getElementById('hud');
        const crosshair = document.getElementById('crosshair');
        const pauseMenu = document.getElementById('pause-menu');
        const buyMenu = document.getElementById('buy-menu');
        const deathScreen = document.getElementById('death-screen');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatLog = document.getElementById('chat-log');
        const serverList = document.getElementById('server-list');

        // --- Map Loading ---
        const MAP_URL = './dust2/scene.gltf'; 
        const loader = new GLTFLoader();
        
        loader.load(MAP_URL, (gltf) => {
            const map = gltf.scene;
            map.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.frustumCulled = true;
                    child.castShadow = true;
                    child.receiveShadow = true;
                    child.material = new THREE.MeshLambertMaterial({ map: child.material.map });
                }
            });
            scene.add(map);

            const box = new THREE.Box3().setFromObject(map);
            const center = box.getCenter(new THREE.Vector3());
            spawnPoint.set(center.x, center.y + 10, center.z);
            
            worldOctree.fromGraphNode(map);
            mapLoaded = true;
            addChatMessage("System", "Map loaded successfully. Ready to connect.");
        });

        // --- Server Browser Logic ---
        let servers = [
            { name: "Dust II 24/7 [Local]", ip: "127.0.0.1", players: 9 },
            { name: "Competitive Proxy", ip: "192.168.1.55", players: 4 }
        ];

        function renderServers() {
            serverList.innerHTML = '';
            servers.forEach(srv => {
                const div = document.createElement('div');
                div.className = 'server-item';
                div.innerHTML = `
                    <div><strong>${srv.name}</strong><br><span style="font-size:12px; color:#aaa;">${srv.ip} | Players: ${srv.players}/10</span></div>
                    <button onclick="window.connectToServer()">Connect</button>
                `;
                serverList.appendChild(div);
            });
        }
        renderServers();

        document.getElementById('btn-add-server').addEventListener('click', () => {
            const ip = document.getElementById('new-server-ip').value;
            if (ip) {
                servers.push({ name: "Custom Server", ip: ip, players: 0 });
                renderServers();
                document.getElementById('new-server-ip').value = '';
            }
        });

        // --- Connection & Team Logic ---
        window.connectToServer = () => {
            if (!mapLoaded) return alert("Please wait for the map to finish loading...");
            
            // Auto-assign team
            const totalPlayers = Math.floor(Math.random() * 10); // Mock player count
            playerStats.team = (totalPlayers % 2 === 0) ? 'TERRORIST' : 'COUNTER-TERRORIST';
            
            document.getElementById('hud-team').innerText = `TEAM: ${playerStats.team}`;
            document.getElementById('hud-team').style.color = playerStats.team === 'TERRORIST' ? '#e6b800' : '#6699ff';

            menuLayer.style.display = 'none';
            hud.style.display = 'flex';
            crosshair.style.display = 'block';
            chatContainer.style.display = 'flex';
            
            respawnPlayer();
            gameState = 'PLAYING';
            controls.lock();
            addChatMessage("Server", `You joined the game. Assigned to ${playerStats.team}.`);
        };

        // --- Controls & Menus ---
        const controls = new PointerLockControls(camera, document.body);

        controls.addEventListener('lock', () => {
            if (gameState === 'PAUSED' || gameState === 'BUY_MENU') {
                pauseMenu.classList.remove('active');
                buyMenu.classList.remove('active');
                gameState = 'PLAYING';
            }
        });

        controls.addEventListener('unlock', () => {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED';
                pauseMenu.classList.add('active');
            }
        });

        document.getElementById('btn-resume').addEventListener('click', () => controls.lock());
        document.getElementById('btn-disconnect').addEventListener('click', () => {
            location.reload(); // Quickest way to fully reset client for this demo
        });

        document.getElementById('btn-close-buy').addEventListener('click', () => controls.lock());

        // Buy Menu Logic
        document.querySelectorAll('.buy-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const weapon = e.currentTarget.getAttribute('data-weapon');
                const price = parseInt(e.currentTarget.getAttribute('data-price'));
                
                if (playerStats.money >= price) {
                    playerStats.money -= price;
                    playerStats.inventory.push(weapon);
                    updateHUD();
                    addChatMessage("System", `Bought ${weapon}.`);
                    controls.lock(); // Auto close on buy
                } else {
                    addChatMessage("System", "Not enough money!");
                }
            });
        });

        // --- Chat Logic ---
        function addChatMessage(sender, msg) {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:#ffcc00">${sender}:</span> ${msg}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // --- Input Tracking ---
        const keyStates = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, Space: false, ShiftLeft: false, ControlLeft: false };
        
        document.addEventListener('keydown', (e) => {
            // Chat Input Handling
            if (e.code === 'Enter') {
                if (document.activeElement === chatInput) {
                    if (chatInput.value.trim() !== '') {
                        addChatMessage(playerStats.team === 'TERRORIST' ? 'T-Player' : 'CT-Player', chatInput.value);
                        chatInput.value = '';
                    }
                    chatInput.style.display = 'none';
                    chatInput.blur();
                    controls.lock();
                } else if (gameState === 'PLAYING') {
                    controls.unlock();
                    chatInput.style.display = 'block';
                    chatInput.focus();
                }
                return; // Stop processing other keys
            }

            if (document.activeElement === chatInput) return; // Ignore movement keys while chatting

            // Buy Menu Toggle
            if (e.code === 'KeyB' && gameState === 'PLAYING') {
                controls.unlock();
                gameState = 'BUY_MENU';
                buyMenu.classList.add('active');
                document.getElementById('buy-money').innerText = `$${playerStats.money}`;
                return;
            }

            if (keyStates[e.code] !== undefined) keyStates[e.code] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (document.activeElement === chatInput) return;
            if (keyStates[e.code] !== undefined) keyStates[e.code] = false;
        });


        // --- Health & Death Logic ---
        function updateHUD() {
            document.getElementById('hud-health').innerText = `+ ${playerStats.health}`;
            document.getElementById('hud-money').innerText = `$ ${playerStats.money}`;
        }

        function takeDamage(amount) {
            if (gameState === 'DEAD') return;
            playerStats.health -= amount;
            updateHUD();
            if (playerStats.health <= 0) die();
        }

        function die() {
            gameState = 'DEAD';
            playerStats.health = 0;
            updateHUD();
            controls.unlock();
            
            deathScreen.style.display = 'flex';
            hud.style.display = 'none';
            crosshair.style.display = 'none';

            setTimeout(() => {
                respawnPlayer();
            }, 3000);
        }

        function respawnPlayer() {
            playerStats.health = 100;
            updateHUD();
            
            playerVelocity.set(0, 0, 0);
            playerCollider.start.copy(spawnPoint);
            playerCollider.end.copy(spawnPoint);
            playerCollider.end.y += HEIGHT_STAND;
            
            deathScreen.style.display = 'none';
            if (gameState !== 'MAIN_MENU') {
                hud.style.display = 'flex';
                crosshair.style.display = 'block';
                gameState = 'PLAYING';
                controls.lock();
            }
        }

        // --- Physics Engine ---
        function getForwardVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0; 
            return playerDirection.normalize();
        }

        function getSideVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            return playerDirection.normalize().cross(camera.up);
        }

        function handleMovement(deltaTime) {
            // Stop movement entirely if not actively playing (e.g. typing, dead, in menu)
            if (gameState !== 'PLAYING') return;

            const isCrouching = keyStates['ControlLeft'];
            const isSprinting = keyStates['ShiftLeft'] && !isCrouching && playerOnFloor;

            let currentSpeed = BASE_SPEED;
            if (isCrouching) currentSpeed = CROUCH_SPEED;
            else if (isSprinting) currentSpeed = SPRINT_SPEED;

            const speedDelta = deltaTime * (playerOnFloor ? currentSpeed : AIR_CONTROL);

            if (keyStates['KeyW']) playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
            if (keyStates['KeyS']) playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyA']) playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyD']) playerVelocity.add(getSideVector().multiplyScalar(speedDelta));

            if (playerOnFloor && keyStates['Space']) {
                playerVelocity.y = JUMP_FORCE;
                keyStates['Space'] = false; 
            }

            // Smooth Crouch View
            const targetHeight = isCrouching ? HEIGHT_CROUCH : HEIGHT_STAND;
            let currentHeight = playerCollider.end.y - playerCollider.start.y;
            currentHeight += (targetHeight - currentHeight) * 15.0 * deltaTime;
            playerCollider.end.y = playerCollider.start.y + currentHeight;
        }

        function applyCollisions(collider, velocity) {
            const result = worldOctree.capsuleIntersect(collider);
            let onFloor = false;

            if (result) {
                onFloor = result.normal.y > 0.5; 
                if (!onFloor) {
                    velocity.addScaledVector(result.normal, -result.normal.dot(velocity));
                } else {
                    velocity.y = Math.max(0, velocity.y);
                }
                collider.translate(result.normal.multiplyScalar(result.depth));
            }
            return onFloor;
        }

        function updatePlayer(deltaTime) {
            // Apply physics even if dead so body falls
            let damping = Math.exp(-15 * deltaTime) - 1; 
            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime; 
                damping *= 0.05; 
            }

            playerVelocity.addScaledVector(playerVelocity, damping);
            
            // STRICT SPEED CAP
            const hSpeed = Math.sqrt(playerVelocity.x * playerVelocity.x + playerVelocity.z * playerVelocity.z);
            if (hSpeed > SPRINT_SPEED) {
                const ratio = SPRINT_SPEED / hSpeed;
                playerVelocity.x *= ratio;
                playerVelocity.z *= ratio;
            }

            playerCollider.translate(playerVelocity.clone().multiplyScalar(deltaTime));
            playerOnFloor = applyCollisions(playerCollider, playerVelocity);
            
            camera.position.copy(playerCollider.end);

            // Out of bounds death
            if (camera.position.y < -50 && gameState === 'PLAYING') {
                takeDamage(100); // Kills the player
            }
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (mapLoaded) {
                const deltaTime = Math.min(0.05, clock.getDelta()) / 5;
                for (let i = 0; i < 5; i++) {
                    handleMovement(deltaTime);
                    updatePlayer(deltaTime);
                }
            } else {
                clock.getDelta(); 
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
