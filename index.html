<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 WebGL - Optimized Movement & AI</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #ddd;
        }
        
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
        }

        #loading {
            position: absolute;
            top: 15px;
            left: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        #menu-container {
            pointer-events: auto; 
            background-color: rgba(15, 15, 15, 0.95);
            padding: 30px;
            border: 1px solid #333;
            text-align: center;
            min-width: 300px;
        }

        .menu-screen {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .menu-screen.active {
            display: flex;
        }

        h2 { margin-top: 0; margin-bottom: 20px; font-weight: normal; color: #fff; }
        
        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.1s;
        }
        button:hover { background-color: #555; }
        
        .setting-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .setting-group label { margin-bottom: 5px; }
        .setting-group input[type="range"] { width: 100%; cursor: pointer; }
        .setting-inline { flex-direction: row; align-items: center; justify-content: space-between; width: 100%; }

    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="loading">Loading Map...</div>
        <div id="crosshair"></div>
        
        <div id="menu-container">
            <div id="main-menu" class="menu-screen active">
                <h2>Game Paused</h2>
                <button id="resume-btn">Resume</button>
                <button id="settings-btn">Settings</button>
                <p style="color: #777; font-size: 11px; margin-top: 20px;">
                    WASD: Move | SPACE: Jump<br>
                    SHIFT: Sprint | CTRL: Crouch
                </p>
            </div>

            <div id="settings-menu" class="menu-screen">
                <h2>Settings</h2>
                <div class="setting-group">
                    <label>Resolution Scale: <span id="res-val">100%</span></label>
                    <input type="range" id="res-slider" min="0.25" max="1.0" step="0.25" value="1.0">
                </div>
                <div class="setting-group">
                    <label>Sensitivity: <span id="sens-val">1.0</span></label>
                    <input type="range" id="sens-slider" min="0.1" max="5.0" step="0.1" value="1.0">
                </div>
                <div class="setting-group">
                    <label>Base FOV: <span id="fov-val">75</span></label>
                    <input type="range" id="fov-slider" min="60" max="110" step="1" value="75">
                </div>
                <div class="setting-group setting-inline">
                    <label for="bots-toggle">Enable AI Bots</label>
                    <input type="checkbox" id="bots-toggle" checked>
                </div>
                <button id="back-btn" style="margin-top: 10px;">Back</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 0, 200);

        let baseFov = 75;
        let botsEnabled = true;

        const camera = new THREE.PerspectiveCamera(baseFov, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1.0); // Manage via settings
        document.body.appendChild(renderer.domElement);

        // Basic lighting for entities (map doesn't use it for extreme optimization)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        // --- Physics & Collision Variables ---
        const clock = new THREE.Clock();
        const worldOctree = new Octree();

        const CAPSULE_RADIUS = 0.35;
        const HEIGHT_STAND = 0.38;
        const HEIGHT_CROUCH = 0.05;

        // Player Setup
        const playerCollider = new Capsule(
            new THREE.Vector3(0, 0, 0), 
            new THREE.Vector3(0, HEIGHT_STAND, 0), 
            CAPSULE_RADIUS
        );
        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        let playerOnFloor = false;
        let mapLoaded = false;

        // Visual Player Capsule (Transparent cyan so it doesn't block vision)
        const capsuleGeo = new THREE.CapsuleGeometry(CAPSULE_RADIUS, HEIGHT_STAND, 4, 8);
        const playerMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.2, wireframe: true });
        const playerMesh = new THREE.Mesh(capsuleGeo, playerMat);
        scene.add(playerMesh);

        // Movement Tweaks
        const GRAVITY = 30.0;
        const JUMP_FORCE = 11.0;
        const BASE_SPEED = 28.0;   // Slower walk
        const SPRINT_SPEED = 55.0; // Slower sprint (Acts as absolute Cap)
        const CROUCH_SPEED = 12.0; 
        const AIR_CONTROL = 12.0;

        // --- AI Bots Setup ---
        const bots = [];
        const botMat = new THREE.MeshBasicMaterial({ color: 0xff3333 }); // Red visible bots

        for (let i = 0; i < 3; i++) {
            const botMesh = new THREE.Mesh(capsuleGeo, botMat);
            scene.add(botMesh);
            bots.push({
                collider: new Capsule(new THREE.Vector3(), new THREE.Vector3(0, HEIGHT_STAND, 0), CAPSULE_RADIUS),
                mesh: botMesh,
                velocity: new THREE.Vector3(),
                direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
                onFloor: false,
                turnTimer: 0
            });
        }

        // --- Menu Logic & Settings ---
        const controls = new PointerLockControls(camera, document.body);
        const menuContainer = document.getElementById('menu-container');
        
        document.getElementById('resume-btn').addEventListener('click', () => controls.lock());
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('main-menu').classList.remove('active');
            document.getElementById('settings-menu').classList.add('active');
        });
        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('settings-menu').classList.remove('active');
            document.getElementById('main-menu').classList.add('active');
        });

        controls.addEventListener('lock', () => menuContainer.style.display = 'none');
        controls.addEventListener('unlock', () => {
            menuContainer.style.display = 'block';
            document.getElementById('main-menu').classList.add('active');
            document.getElementById('settings-menu').classList.remove('active');
        });

        // Settings Listeners
        document.getElementById('res-slider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            renderer.setPixelRatio(window.devicePixelRatio * val);
            document.getElementById('res-val').innerText = (val * 100) + '%';
        });
        document.getElementById('sens-slider').addEventListener('input', (e) => {
            controls.pointerSpeed = parseFloat(e.target.value);
            document.getElementById('sens-val').innerText = e.target.value;
        });
        document.getElementById('fov-slider').addEventListener('input', (e) => {
            baseFov = parseInt(e.target.value);
            document.getElementById('fov-val').innerText = baseFov;
            camera.fov = baseFov;
            camera.updateProjectionMatrix();
        });
        document.getElementById('bots-toggle').addEventListener('change', (e) => {
            botsEnabled = e.target.checked;
            bots.forEach(bot => bot.mesh.visible = botsEnabled);
        });

        // Input Tracking
        const keyStates = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, Space: false, ShiftLeft: false, ControlLeft: false };
        document.addEventListener('keydown', (e) => { if (keyStates[e.code] !== undefined) keyStates[e.code] = true; });
        document.addEventListener('keyup', (e) => { if (keyStates[e.code] !== undefined) keyStates[e.code] = false; });

        // --- Map Loading & Optimization ---
        const MAP_URL = './dust2/scene.gltf'; 
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loading');

        loader.load(
            MAP_URL,
            (gltf) => {
                const map = gltf.scene;

                // EXTREME OPTIMIZATION: Convert all materials to Basic (No Light Calculation)
                map.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.frustumCulled = true;
                        // Strip complex shaders, keep the texture map
                        const basicMat = new THREE.MeshBasicMaterial({ map: child.material.map });
                        child.material = basicMat;
                    }
                });

                scene.add(map);

                const box = new THREE.Box3().setFromObject(map);
                const center = box.getCenter(new THREE.Vector3());
                const dropHeight = center.y + 10; 
                
                // Spawn Player
                playerCollider.start.set(center.x, dropHeight, center.z);
                playerCollider.end.set(center.x, dropHeight + HEIGHT_STAND, center.z); 

                // Spawn Bots nearby
                bots.forEach((bot, index) => {
                    const offset = index * 2 + 2;
                    bot.collider.start.set(center.x + offset, dropHeight, center.z + offset);
                    bot.collider.end.set(center.x + offset, dropHeight + HEIGHT_STAND, center.z + offset);
                });

                worldOctree.fromGraphNode(map);
                mapLoaded = true;

                loadingText.innerText = "";
            },
            (xhr) => {
                loadingText.innerText = `Loading Map: ${Math.round(xhr.loaded / xhr.total * 100)}%`;
            },
            (error) => { loadingText.innerText = "Error loading map!"; }
        );

        // --- Physics Engine ---
        function getForwardVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0; 
            return playerDirection.normalize();
        }

        function getSideVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            return playerDirection.normalize().cross(camera.up);
        }

        function handleInput(deltaTime) {
            const isCrouching = keyStates['ControlLeft'];
            const isSprinting = keyStates['ShiftLeft'] && !isCrouching && playerOnFloor;

            let currentSpeed = BASE_SPEED;
            if (isCrouching) currentSpeed = CROUCH_SPEED;
            else if (isSprinting) currentSpeed = SPRINT_SPEED;

            const speedDelta = deltaTime * (playerOnFloor ? currentSpeed : AIR_CONTROL);

            if (keyStates['KeyW']) playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
            if (keyStates['KeyS']) playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyA']) playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyD']) playerVelocity.add(getSideVector().multiplyScalar(speedDelta));

            if (playerOnFloor && keyStates['Space']) {
                playerVelocity.y = JUMP_FORCE;
                keyStates['Space'] = false; 
            }

            // --- STRICT SPEED CAP ---
            // Ensures player cannot exceed sprint speed horizontally (stops strafe-jumping abuse)
            const horizontalSpeed = Math.sqrt(playerVelocity.x * playerVelocity.x + playerVelocity.z * playerVelocity.z);
            if (horizontalSpeed > SPRINT_SPEED) {
                const ratio = SPRINT_SPEED / horizontalSpeed;
                playerVelocity.x *= ratio;
                playerVelocity.z *= ratio;
            }

            // Smooth FOV & Crouch
            camera.fov += ((baseFov + (isSprinting ? 15 : 0)) - camera.fov) * 10.0 * deltaTime;
            camera.updateProjectionMatrix();

            const targetHeight = isCrouching ? HEIGHT_CROUCH : HEIGHT_STAND;
            let currentHeight = playerCollider.end.y - playerCollider.start.y;
            currentHeight += (targetHeight - currentHeight) * 15.0 * deltaTime;
            playerCollider.end.y = playerCollider.start.y + currentHeight;
        }

        function applyCollisions(collider, velocity) {
            const result = worldOctree.capsuleIntersect(collider);
            let onFloor = false;

            if (result) {
                onFloor = result.normal.y > 0.5; 
                if (!onFloor) {
                    velocity.addScaledVector(result.normal, -result.normal.dot(velocity));
                } else {
                    velocity.y = Math.max(0, velocity.y);
                }
                collider.translate(result.normal.multiplyScalar(result.depth));
            }
            return onFloor;
        }

        function updatePlayer(deltaTime) {
            let damping = Math.exp(-15 * deltaTime) - 1; 
            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime; 
                damping *= 0.05; 
            }

            playerVelocity.addScaledVector(playerVelocity, damping);
            playerCollider.translate(playerVelocity.clone().multiplyScalar(deltaTime));

            playerOnFloor = applyCollisions(playerCollider, playerVelocity);
            
            // Sync Camera and Player Mesh
            camera.position.copy(playerCollider.end);
            playerMesh.position.copy(playerCollider.start);
            playerMesh.position.y += HEIGHT_STAND / 2; // Center mesh vertically

            // Void Fail-safe
            if (camera.position.y < -500) {
                playerVelocity.set(0, 0, 0);
                playerCollider.start.y += 200; 
                playerCollider.end.y += 200;
            }
        }

        function updateBots(deltaTime) {
            if (!botsEnabled) return;

            bots.forEach(bot => {
                bot.turnTimer -= deltaTime;
                if (bot.turnTimer <= 0) {
                    // Pick new random direction
                    bot.direction.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                    bot.turnTimer = 1 + Math.random() * 3; // Change direction every 1-4 seconds
                }

                let damping = Math.exp(-15 * deltaTime) - 1;
                if (!bot.onFloor) {
                    bot.velocity.y -= GRAVITY * deltaTime;
                    damping *= 0.05;
                }

                // AI Walks Forward constantly
                if (bot.onFloor) {
                    bot.velocity.add(bot.direction.clone().multiplyScalar(BASE_SPEED * deltaTime));
                }

                // AI Speed Cap
                const hSpeed = Math.sqrt(bot.velocity.x * bot.velocity.x + bot.velocity.z * bot.velocity.z);
                if (hSpeed > BASE_SPEED) {
                    bot.velocity.x *= (BASE_SPEED / hSpeed);
                    bot.velocity.z *= (BASE_SPEED / hSpeed);
                }

                bot.velocity.addScaledVector(bot.velocity, damping);
                bot.collider.translate(bot.velocity.clone().multiplyScalar(deltaTime));

                // Manual collision check to let them bounce off walls
                const result = worldOctree.capsuleIntersect(bot.collider);
                bot.onFloor = false;
                if (result) {
                    bot.onFloor = result.normal.y > 0.5;
                    if (!bot.onFloor) {
                        // Wall Hit: Bounce/Reflect direction
                        bot.velocity.addScaledVector(result.normal, -result.normal.dot(bot.velocity));
                        bot.direction.reflect(result.normal).normalize();
                        bot.direction.y = 0; 
                    } else {
                        bot.velocity.y = Math.max(0, bot.velocity.y);
                    }
                    bot.collider.translate(result.normal.multiplyScalar(result.depth));
                }

                // Sync Bot Mesh
                bot.mesh.position.copy(bot.collider.start);
                bot.mesh.position.y += HEIGHT_STAND / 2;
                
                // Void fail-safe for bots
                if (bot.mesh.position.y < -500) {
                    bot.velocity.set(0, 0, 0);
                    bot.collider.start.y += 200;
                    bot.collider.end.y += 200;
                }
            });
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (mapLoaded && controls.isLocked === true) {
                const deltaTime = Math.min(0.05, clock.getDelta()) / 5;
                for (let i = 0; i < 5; i++) {
                    handleInput(deltaTime);
                    updatePlayer(deltaTime);
                    updateBots(deltaTime);
                }
            } else {
                clock.getDelta(); 
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
