<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 WebGL Movement - Advanced Physics & Menus</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through when playing */
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: #00ff00;
            transform: translate(-50%, -50%);
        }

        #loading {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        /* Menus */
        #menu-container {
            pointer-events: auto; /* Re-enable clicks for the menu */
            background-color: rgba(20, 20, 20, 0.85);
            padding: 30px 50px;
            border-radius: 8px;
            color: white;
            text-align: center;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 300px;
        }

        .menu-screen {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .menu-screen.active {
            display: flex;
        }

        h2 { margin-top: 0; margin-bottom: 20px; color: #ffaa00; }
        
        button {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover { background-color: #666; }
        
        .setting-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .setting-group label { margin-bottom: 5px; font-size: 14px; }
        input[type="range"] { width: 100%; cursor: pointer; }

    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="loading">Loading Map Geometry...</div>
        <div id="crosshair"></div>
        
        <div id="menu-container">
            <div id="main-menu" class="menu-screen active">
                <h2>Game Paused</h2>
                <button id="resume-btn">Resume Game</button>
                <button id="settings-btn">Settings</button>
                <p style="color: #aaa; font-size: 12px; margin-top: 20px;">
                    WASD: Move | SPACE: Jump<br>
                    SHIFT: Sprint | CTRL: Crouch
                </p>
            </div>

            <div id="settings-menu" class="menu-screen">
                <h2>Settings</h2>
                <div class="setting-group">
                    <label>Sensitivity: <span id="sens-val">1.0</span></label>
                    <input type="range" id="sens-slider" min="0.1" max="5.0" step="0.1" value="1.0">
                </div>
                <div class="setting-group">
                    <label>Base FOV: <span id="fov-val">75</span></label>
                    <input type="range" id="fov-slider" min="60" max="110" step="1" value="75">
                </div>
                <button id="back-btn" style="margin-top: 10px;">Back</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 0, 300);

        // Global Settings Variables
        let baseFov = 75;

        const camera = new THREE.PerspectiveCamera(baseFov, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); 
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0); 
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // --- Physics & Collision Variables ---
        const clock = new THREE.Clock();
        const worldOctree = new Octree();

        // Capsule Setup (40% shorter)
        const CAPSULE_RADIUS = 0.35;
        const HEIGHT_STAND = 0.38;
        const HEIGHT_CROUCH = 0.05; // Physically shrinks to go under things

        const playerCollider = new Capsule(
            new THREE.Vector3(0, 0, 0), 
            new THREE.Vector3(0, HEIGHT_STAND, 0), 
            CAPSULE_RADIUS
        );

        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        let playerOnFloor = false;
        let mapLoaded = false;

        // Speed & Movement Tweaks
        const GRAVITY = 30.0;
        const JUMP_FORCE = 11.0;
        const BASE_SPEED = 35.0;   // Way slower base walk
        const SPRINT_SPEED = 65.0; // Faster sprint
        const CROUCH_SPEED = 15.0; // Very slow crouch
        const AIR_CONTROL = 15.0;

        // --- Controls & Menu Logic ---
        const controls = new PointerLockControls(camera, document.body);
        
        const menuContainer = document.getElementById('menu-container');
        const mainMenu = document.getElementById('main-menu');
        const settingsMenu = document.getElementById('settings-menu');
        const resumeBtn = document.getElementById('resume-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const backBtn = document.getElementById('back-btn');

        // Menu Event Listeners
        resumeBtn.addEventListener('click', () => controls.lock());
        
        settingsBtn.addEventListener('click', () => {
            mainMenu.classList.remove('active');
            settingsMenu.classList.add('active');
        });
        
        backBtn.addEventListener('click', () => {
            settingsMenu.classList.remove('active');
            mainMenu.classList.add('active');
        });

        // PointerLock Event Listeners
        controls.addEventListener('lock', () => menuContainer.style.display = 'none');
        controls.addEventListener('unlock', () => {
            menuContainer.style.display = 'block';
            mainMenu.classList.add('active');
            settingsMenu.classList.remove('active');
        });

        // Settings Sliders
        document.getElementById('sens-slider').addEventListener('input', (e) => {
            controls.pointerSpeed = parseFloat(e.target.value);
            document.getElementById('sens-val').innerText = e.target.value;
        });

        document.getElementById('fov-slider').addEventListener('input', (e) => {
            baseFov = parseInt(e.target.value);
            document.getElementById('fov-val').innerText = baseFov;
            camera.fov = baseFov;
            camera.updateProjectionMatrix();
        });

        // Input Tracking
        const keyStates = { 
            KeyW: false, KeyA: false, KeyS: false, KeyD: false, 
            Space: false, ShiftLeft: false, ControlLeft: false 
        };

        document.addEventListener('keydown', (event) => {
            if (keyStates[event.code] !== undefined) keyStates[event.code] = true;
        });
        document.addEventListener('keyup', (event) => {
            if (keyStates[event.code] !== undefined) keyStates[event.code] = false;
        });

        // --- Map Loading ---
        const MAP_URL = './dust2/scene.gltf'; 
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loading');

        loader.load(
            MAP_URL,
            (gltf) => {
                const map = gltf.scene;
                map.scale.set(1.0, 1.0, 1.0); 

                map.traverse((child) => {
                    if (child.isMesh) {
                        child.frustumCulled = true; 
                        if (child.material) {
                            child.material.metalness = 0.0; 
                            child.material.roughness = 1.0; 
                        }
                    }
                });

                scene.add(map);

                const box = new THREE.Box3().setFromObject(map);
                const center = box.getCenter(new THREE.Vector3());
                const dropHeight = center.y + 10; 
                
                playerCollider.start.set(center.x, dropHeight, center.z);
                playerCollider.end.set(center.x, dropHeight + HEIGHT_STAND, center.z); 

                worldOctree.fromGraphNode(map);
                mapLoaded = true;

                loadingText.innerText = "Map Loaded!";
                loadingText.style.color = "#00ff00";
                setTimeout(() => loadingText.style.display = 'none', 3000);
            },
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                loadingText.innerText = `Loading Map & Optimizing: ${percent}%`;
            },
            (error) => {
                console.error('Error loading map:', error);
                loadingText.innerText = "Error loading map! Check F12 Console.";
                loadingText.style.color = "red";
            }
        );

        // --- Physics Engine Functions ---
        function getForwardVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0; 
            playerDirection.normalize();
            return playerDirection;
        }

        function getSideVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            playerDirection.cross(camera.up);
            return playerDirection;
        }

        function handleInput(deltaTime) {
            const isCrouching = keyStates['ControlLeft'];
            const isSprinting = keyStates['ShiftLeft'] && !isCrouching && playerOnFloor;

            // Determine Movement Speed
            let currentSpeed = BASE_SPEED;
            if (isCrouching) currentSpeed = CROUCH_SPEED;
            else if (isSprinting) currentSpeed = SPRINT_SPEED;

            const speedDelta = deltaTime * (playerOnFloor ? currentSpeed : AIR_CONTROL);

            if (keyStates['KeyW']) playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
            if (keyStates['KeyS']) playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyA']) playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyD']) playerVelocity.add(getSideVector().multiplyScalar(speedDelta));

            if (playerOnFloor && keyStates['Space']) {
                playerVelocity.y = JUMP_FORCE;
                keyStates['Space'] = false; 
            }

            // Smoothly interpolate Camera FOV for sprinting
            const targetFov = baseFov + (isSprinting ? 15 : 0);
            camera.fov += (targetFov - camera.fov) * 10.0 * deltaTime;
            camera.updateProjectionMatrix();

            // Smoothly interpolate Capsule Height for crouching
            const targetHeight = isCrouching ? HEIGHT_CROUCH : HEIGHT_STAND;
            let currentHeight = playerCollider.end.y - playerCollider.start.y;
            currentHeight += (targetHeight - currentHeight) * 15.0 * deltaTime;
            playerCollider.end.y = playerCollider.start.y + currentHeight;
        }

        function playerCollisions() {
            const result = worldOctree.capsuleIntersect(playerCollider);
            playerOnFloor = false;

            if (result) {
                playerOnFloor = result.normal.y > 0.5; 

                if (!playerOnFloor) {
                    playerVelocity.addScaledVector(result.normal, -result.normal.dot(playerVelocity));
                } else {
                    playerVelocity.y = Math.max(0, playerVelocity.y);
                }
                playerCollider.translate(result.normal.multiplyScalar(result.depth));
            }
        }

        function updatePlayer(deltaTime) {
            let damping = Math.exp(-15 * deltaTime) - 1; 

            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime; 
                damping *= 0.05; 
            }

            playerVelocity.addScaledVector(playerVelocity, damping);
            const deltaPosition = playerVelocity.clone().multiplyScalar(deltaTime);
            playerCollider.translate(deltaPosition);

            playerCollisions();
            camera.position.copy(playerCollider.end);

            if (camera.position.y < -500) {
                playerVelocity.set(0, 0, 0);
                playerCollider.start.y += 200; 
                playerCollider.end.y += 200;
            }
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (mapLoaded && controls.isLocked === true) {
                const deltaTime = Math.min(0.05, clock.getDelta()) / 5;
                for (let i = 0; i < 5; i++) {
                    handleInput(deltaTime);
                    updatePlayer(deltaTime);
                }
            } else {
                clock.getDelta(); 
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
