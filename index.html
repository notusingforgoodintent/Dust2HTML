<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 WebGL Movement - Octree Collision</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: #00ff00;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            z-index: 20;
            text-shadow: 1px 1px 2px black;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Map Geometry into Octree...</div>
    <div id="blocker">
        <div>
            <h2>Click to Play</h2>
            <p>W, A, S, D to move | SPACE to jump | Mouse to look</p>
        </div>
    </div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        // Import Octree and Capsule for full 3D collision
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 0, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Camera starts unattached; we will glue it to the Capsule later
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // --- Physics & Collision Variables ---
        const clock = new THREE.Clock();
        const worldOctree = new Octree();

        // Player Capsule: Starting at y=50 to fall onto the map. 
        // Radius is 0.35. Height is from 50.35 to 51.45 (total height ~1.8 units)
        const playerCollider = new Capsule(
            new THREE.Vector3(0, 50.35, 0), 
            new THREE.Vector3(0, 51.45, 0), 
            0.35
        );

        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        let playerOnFloor = false;

        // Tweaked physics
        const GRAVITY = 30.0;
        const JUMP_FORCE = 12.0;
        const SPEED = 25.0; // Adjusted for Capsule physics math
        const AIR_CONTROL = 5.0;

        // --- Map Loading ---
        const MAP_URL = './dust2/scene.gltf'; 
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loading');
        let mapLoaded = false;

        loader.load(
            MAP_URL,
            (gltf) => {
                const map = gltf.scene;
                map.scale.set(1.0, 1.0, 1.0); 

                scene.add(map);

                // IMPORTANT: Generate the Octree from the loaded 3D model
                // This builds the collision mesh data structure
                worldOctree.fromGraphNode(map);
                mapLoaded = true;

                loadingText.innerText = "Map & Collisions Loaded! Click to play.";
                loadingText.style.color = "#00ff00";
                setTimeout(() => loadingText.style.display = 'none', 3000);
            },
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                loadingText.innerText = `Loading Map & Building Octree: ${percent}%`;
            },
            (error) => {
                console.error('Error loading map:', error);
                loadingText.innerText = "Error loading map!";
                loadingText.style.color = "red";
            }
        );

        // --- Controls & Input ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');

        const keyStates = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, Space: false };

        document.addEventListener('keydown', (event) => {
            if (keyStates[event.code] !== undefined) keyStates[event.code] = true;
        });

        document.addEventListener('keyup', (event) => {
            if (keyStates[event.code] !== undefined) keyStates[event.code] = false;
        });

        // --- Physics Engine Functions ---

        function getForwardVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0; // Don't fly up when looking up
            playerDirection.normalize();
            return playerDirection;
        }

        function getSideVector() {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            playerDirection.cross(camera.up);
            return playerDirection;
        }

        function handleInput(deltaTime) {
            // Give different speed depending on if we are in the air or on the ground
            const speedDelta = deltaTime * (playerOnFloor ? SPEED : AIR_CONTROL);

            if (keyStates['KeyW']) playerVelocity.add(getForwardVector().multiplyScalar(speedDelta));
            if (keyStates['KeyS']) playerVelocity.add(getForwardVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyA']) playerVelocity.add(getSideVector().multiplyScalar(-speedDelta));
            if (keyStates['KeyD']) playerVelocity.add(getSideVector().multiplyScalar(speedDelta));

            if (playerOnFloor && keyStates['Space']) {
                playerVelocity.y = JUMP_FORCE;
                keyStates['Space'] = false; // Prevent holding space to bounce
            }
        }

        function playerCollisions() {
            // Check the Octree for intersection with our Capsule
            const result = worldOctree.capsuleIntersect(playerCollider);
            playerOnFloor = false;

            if (result) {
                // Determine if the surface we hit is flat enough to be a floor
                playerOnFloor = result.normal.y > 0.5; // Walkable slope tolerance

                if (!playerOnFloor) {
                    // Wall collision: Slide along the wall instead of sticking to it
                    playerVelocity.addScaledVector(result.normal, -result.normal.dot(playerVelocity));
                } else {
                    // Stop downward velocity when hitting the floor
                    playerVelocity.y = Math.max(0, playerVelocity.y);
                }

                // Push the capsule out of the geometry so we don't clip
                playerCollider.translate(result.normal.multiplyScalar(result.depth));
            }
        }

        function updatePlayer(deltaTime) {
            let damping = Math.exp(-4 * deltaTime) - 1; // Ground friction

            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime; // Apply gravity
                damping *= 0.1; // Less friction in the air
            }

            // Apply friction/damping to current velocity
            playerVelocity.addScaledVector(playerVelocity, damping);

            // Move the capsule by the current velocity
            const deltaPosition = playerVelocity.clone().multiplyScalar(deltaTime);
            playerCollider.translate(deltaPosition);

            // Check for walls/floors and push the capsule out if needed
            playerCollisions();

            // Glue the camera to the top of the capsule (the player's eyes)
            camera.position.copy(playerCollider.end);

            // Fail-safe: if you fall off the map into the void, respawn
            if (camera.position.y < -100) {
                playerVelocity.set(0, 0, 0);
                playerCollider.start.set(0, 50.35, 0);
                playerCollider.end.set(0, 51.45, 0);
            }
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Only run physics if the map is loaded and we are actively playing
            if (mapLoaded && controls.isLocked === true) {
                // Use a smaller delta time to prevent physics clipping at low framerates
                // Using 5 substeps per frame drastically improves wall collision reliability
                const deltaTime = Math.min(0.05, clock.getDelta()) / 5;
                
                for (let i = 0; i < 5; i++) {
                    handleInput(deltaTime);
                    updatePlayer(deltaTime);
                }
            } else {
                clock.getDelta(); // Keep clock running to avoid massive jumps when unpausing
            }

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
